<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>桌球影片搜尋</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e5e7eb;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: clamp(22px, 4vw, 32px);
      line-height: 1.25;
      margin: 0 0 16px;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 20px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    input,
    select,
    button {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    button {
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: var(--primary-hover);
    }

    #resultInfo {
      margin: 8px 0 16px;
      color: var(--muted);
      font-size: 14px;
      word-break: break-word;
    }

    .list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .thumb-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .card img,
    .card video,
    .card iframe {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border: 0;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      line-height: 1.5;
      margin: 0 0 8px;
      word-break: break-word;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 10px;
      word-break: break-word;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      word-break: break-word;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (min-width: 640px) {
      .page {
        padding: 24px;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .controls button {
        grid-column: 1 / -1;
      }
    }

    @media (min-width: 900px) {
      .list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>桌球技術影片搜尋</h1>

    <div class="controls">
      <select id="strokeType">
        <option value="forehand">正手</option>
        <option value="backhand">反手</option>
        <option value="serve">發球</option>
      </select>

      <input id="playerName" placeholder="可輸入選手名稱，例如 Fan Zhendong" />
      <input id="extraKeywords" placeholder="補充關鍵字，例如 slow motion" />

      <button onclick="searchVideos()">搜尋影片</button>
    </div>

    <div id="resultInfo"></div>
    <div id="list" class="list"></div>
  </div>

  <script>
    async function searchVideos() {
      const strokeType = document.getElementById("strokeType").value;
      const playerName = document.getElementById("playerName").value.trim();
      const extraKeywords = document.getElementById("extraKeywords").value.trim();
      const list = document.getElementById("list");
      const resultInfo = document.getElementById("resultInfo");

      resultInfo.textContent = "搜尋中...";
      list.innerHTML = "";

      const keyword = [playerName, strokeType, extraKeywords]
        .filter(Boolean)
        .join(" ");

      resultInfo.textContent = `目前搜尋關鍵字：${keyword}`;

      /* 你原本真正的 API 呼叫與 render 邏輯，貼上來後我再幫你接 */
    }
  </script>
</body>
</html>
